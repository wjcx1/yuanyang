# MySQL 数据库连接配置

# 数据库 URL
db.url=jdbc:mysql://localhost:3306/yuanyang?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false

# 数据库用户名
db.username=root

# 数据库密码
db.password=root

# ���据库驱动
db.driverClass=com.mysql.cj.jdbc.Driver

# 连接池配置
db.maxPoolSize=20
db.minPoolSize=5
db.maxIdleTime=600
db.connectionTimeout=30000

# MyBatis 配置
mybatis.mapperLocations=classpath:mapper/*.xml
mybatis.configLocation=classpath:mybatis-config.xml